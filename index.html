<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#e8508a;--pink2:#f07a5a;--pink-light:#fff0f6;--pink-mid:#ffd6e7;
  --blue:#2d4ba0;--bg:#fff8f9;--white:#fff;
  --text:#1e1226;--muted:#7a6080;--light:#b8a0c0;
  --radius:20px;--radius-sm:12px;--radius-pill:50px;
  --shadow:0 12px 40px rgba(232,80,138,0.15);
  --shadow-sm:0 4px 16px rgba(232,80,138,0.10);
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

header{padding:16px 28px;display:flex;align-items:center;justify-content:center;background:var(--white);border-bottom:2px solid var(--pink-mid)}
header img{height:56px;width:auto}

.ad-slot{background:#f5f3f7;border:1.5px dashed #d8c8e0;text-align:center;padding:14px;font-size:11px;font-weight:800;letter-spacing:2px;color:#c0a8d0;text-transform:uppercase}

.hero{text-align:center;padding:40px 24px 28px;position:relative;overflow:hidden}
.hero::before{content:'💕';position:absolute;font-size:180px;opacity:.04;top:-20px;left:-30px;pointer-events:none}
.hero::after{content:'✨';position:absolute;font-size:140px;opacity:.04;bottom:-10px;right:-20px;pointer-events:none}
.hero h1{font-family:'Nunito',sans-serif;font-size:clamp(28px,5vw,50px);font-weight:900;line-height:1.2;margin-bottom:10px;letter-spacing:-0.5px}
.hero h1 .grad,.selector-card h2 .grad{background:linear-gradient(135deg,var(--pink),var(--pink2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.navy{color:var(--blue);-webkit-text-fill-color:var(--blue)}
.hero p{font-size:16px;color:var(--muted);font-weight:600;max-width:440px;margin:0 auto}

/* MAIN CARD */
.main-card{max-width:620px;margin:28px auto;padding:0 20px 60px}

.selector-card{background:var(--white);border-radius:var(--radius);border:2px solid var(--pink-mid);padding:32px;box-shadow:var(--shadow-sm)}

.selector-card h2{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;margin-bottom:24px;text-align:center;letter-spacing:-0.3px}

/* FORM ROWS */
.form-row{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.form-label .emoji{margin-right:6px}

/* SELECT STYLING */
.select-wrap{position:relative}
.select-wrap::after{content:'▼';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--pink);pointer-events:none;font-weight:900}
select{width:100%;padding:14px 44px 14px 16px;border:2px solid var(--pink-mid);border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:16px;font-weight:700;color:var(--text);background:var(--bg);appearance:none;-webkit-appearance:none;cursor:pointer;outline:none;transition:border-color .2s,box-shadow .2s}
select:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(232,80,138,.12)}
select:hover{border-color:var(--pink)}
select option{font-weight:700;padding:8px}
select:disabled{opacity:.4;cursor:default}

.divider{display:flex;align-items:center;gap:12px;margin:4px 0 20px}
.divider::before,.divider::after{content:'';flex:1;height:2px;background:var(--pink-mid);border-radius:2px}
.divider-text{font-size:13px;font-weight:900;color:var(--light);text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}

/* TRANSLATE BTN */
.btn-translate{width:100%;background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;border:none;border-radius:var(--radius-pill);padding:18px;font-family:'Nunito',sans-serif;font-size:18px;font-weight:900;cursor:pointer;margin-top:8px;transition:all .2s;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;gap:10px}
.btn-translate:hover{transform:translateY(-2px);box-shadow:0 16px 40px rgba(232,80,138,.35)}
.btn-translate:disabled{background:#e0d0e8;box-shadow:none;cursor:default;transform:none}

/* RESULT */
.result-card{background:linear-gradient(135deg,var(--pink) 0%,var(--pink2) 100%);border-radius:var(--radius);padding:36px 28px;color:#fff;text-align:center;margin-top:24px;position:relative;overflow:hidden;box-shadow:0 16px 48px rgba(232,80,138,.35);animation:popIn .4s cubic-bezier(.175,.885,.32,1.275) both}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.result-card::before{content:'💕';position:absolute;font-size:120px;opacity:.08;top:-20px;right:-10px;pointer-events:none}
.result-flag{font-size:48px;margin-bottom:8px}
.result-into{font-size:14px;font-weight:800;opacity:.8;margin-bottom:4px}
.result-phrase-label{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:2px;opacity:.75;margin-bottom:20px}
.result-native{font-size:clamp(26px,5vw,42px);font-weight:900;line-height:1.2;margin-bottom:10px;text-shadow:0 2px 12px rgba(0,0,0,.1)}
.result-phonetic{font-size:16px;opacity:.85;font-style:italic;font-weight:600;margin-bottom:12px}
.result-say-it{font-size:13px;background:rgba(255,255,255,.15);border-radius:10px;padding:10px 16px;margin-bottom:24px;font-weight:700;line-height:1.5}
.result-say-it .say-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;opacity:.75;margin-bottom:4px}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}



}
.btn-copy{background:#fff;color:var(--pink);border:none;padding:12px 24px;border-radius:var(--radius-pill);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.btn-copy:hover{transform:scale(1.04)}
.btn-copy.copied{background:#e8f5e9;color:#2e7d32}

/* SUGGESTIONS */
.suggest-row{margin-top:12px}
.suggest-title{font-size:12px;font-weight:900;opacity:.75;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.suggest-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.suggest-chip{background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);border-radius:var(--radius-pill);padding:7px 14px;font-size:13px;font-weight:800;color:#fff;cursor:pointer;transition:all .2s;font-family:'Nunito',sans-serif}
.suggest-chip:hover{background:rgba(255,255,255,.4);transform:translateY(-1px)}

.btn-reset{display:block;margin:16px auto 0;background:none;border:2px solid var(--pink-mid);border-radius:var(--radius-pill);padding:10px 28px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;color:var(--muted);cursor:pointer;transition:all .2s}
.btn-reset:hover{border-color:var(--pink);color:var(--pink)}

.hidden{display:none!important}

footer{background:#1e1226;color:#a090b0;text-align:center;padding:32px 20px;font-size:13px;font-weight:700;margin-top:40px}
footer img{height:36px;margin-bottom:10px;border-radius:8px}
footer a{color:#d0a0c0;text-decoration:none;margin:0 8px}

@media(max-width:500px){
  header img{height:44px}
  .selector-card{padding:22px 18px}
  .result-native{font-size:clamp(22px,6vw,34px)}
}

/* PHRASE OF THE DAY */
.potd{background:var(--white);border-radius:var(--radius);border:2px solid var(--pink-mid);padding:24px 28px;margin-bottom:20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.potd::before{content:'✨';position:absolute;font-size:80px;opacity:.05;right:-10px;top:-10px;pointer-events:none}
.potd-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.potd-badge{background:linear-gradient(135deg,var(--pink),var(--pink2));color:#fff;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:2px;padding:5px 12px;border-radius:var(--radius-pill)}
.potd-date{font-size:12px;color:var(--light);font-weight:700}
.potd-flag{font-size:32px;margin-bottom:6px}
.potd-phrase-label{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:var(--pink);margin-bottom:8px}
.potd-native{font-size:clamp(20px,4vw,28px);font-weight:900;color:var(--text);margin-bottom:4px;line-height:1.3}
.potd-phonetic{font-size:14px;color:var(--muted);font-style:italic;font-weight:600;margin-bottom:6px}
.potd-lang{font-size:13px;color:var(--light);font-weight:700;margin-bottom:16px}
.potd-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn-potd-copy{background:var(--pink-light);color:var(--pink);border:1.5px solid var(--pink-mid);border-radius:var(--radius-pill);padding:8px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.btn-potd-copy:hover{background:var(--pink);color:#fff}
.btn-potd-copy.copied{background:#e8f5e9;color:#2e7d32;border-color:#b0d0b0}
.btn-potd-share{background:var(--blue-light,#f0f4ff);color:var(--blue);border:1.5px solid #c5d3f5;border-radius:var(--radius-pill);padding:8px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s}
.btn-potd-share:hover{background:var(--blue);color:#fff}

/* SOCIAL SHARE */
.share-bar{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.btn-share{border:none;border-radius:var(--radius-pill);padding:10px 20px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-share:hover{transform:translateY(-2px);filter:brightness(1.1)}
.btn-share.twitter{background:#000;color:#fff}
.btn-share.facebook{background:#1877f2;color:#fff}
.btn-share.whatsapp{background:#25d366;color:#fff}
.btn-share.copy-link{background:#f0f0f0;color:#333}
</style>
</head>

};

// ── STATE ──
let inputLang = null, selectedPhrase = null, outputLang = null;

// ── INIT ──

// ── PHRASE OF THE DAY ──────────────────────────────────────────────────────
function getPotd() {
  const allPhrases = PHRASES;
  const allLangs = LANGUAGES.filter(l => l.bcp47 !== 'en-US');
  // Use date as seed so it changes daily but is consistent per day
  const now = new Date();
  const seed = now.getFullYear() * 10000 + (now.getMonth()+1) * 100 + now.getDate();
  const phraseIdx = seed % allPhrases.length;
  const langIdx = Math.floor(seed / allPhrases.length) % allLangs.length;
  const phrase = allPhrases[phraseIdx];
  const lang = allLangs[langIdx];
  const t = TRANSLATIONS[phrase.key]?.[lang.bcp47];
  if (!t) return;

  document.getElementById('potdDate').textContent = now.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
  document.getElementById('potdFlag').textContent = lang.flag;
  document.getElementById('potdPhraseLabel').textContent = phrase.label.replace(/^.+?  /, '');
  document.getElementById('potdNative').textContent = t.native;
  document.getElementById('potdPhonetic').textContent = '/' + t.phonetic + '/';
  document.getElementById('potdLang').textContent = 'in ' + lang.name + ' (' + lang.native + ')';

  // Store for sharing
  window._potd = { phrase, lang, t };
}

function copyPotd(btn) {
  if (!window._potd) return;
  const { t, phrase, lang } = window._potd;
  const text = phrase.label.replace(/^.+?  /, '') + ' in ' + lang.name + ': ' + t.native + ' (' + t.phonetic + ')';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy phrase'; btn.classList.remove('copied'); }, 1500);
  });
}

function sharePotd() {
  if (!window._potd) return;
  const { t, phrase, lang } = window._potd;
  const text = phrase.label.replace(/^.+?  /, '') + ' in ' + lang.name + ': ' + t.native + ' (' + t.phonetic + ') — flirtlingua.com';
  if (navigator.share) {
    navigator.share({ title: 'FlirtLingua Phrase of the Day', text, url: 'https://www.flirtlingua.com' });
  } else {
    navigator.clipboard.writeText(text);
    alert('Copied to clipboard!');
  }
}

// ── SOCIAL SHARE ───────────────────────────────────────────────────────────
function getShareText() {
  if (!selectedPhrase || !outputLang) return '';
  const t = TRANSLATIONS[selectedPhrase.key]?.[outputLang.bcp47];
  if (!t) return '';
  const phraseLabel = selectedPhrase.label.replace(/^.+?  /, '');
  return phraseLabel + ' in ' + outputLang.name + ': ' + t.native + ' (' + t.phonetic + ') via flirtlingua.com';
}

function shareTwitter() {
  const text = encodeURIComponent(getShareText());
  window.open('https://twitter.com/intent/tweet?text=' + text, '_blank');
}

function shareWhatsApp() {
  const text = encodeURIComponent(getShareText());
  window.open('https://wa.me/?text=' + text, '_blank');
}

function shareFacebook() {
  const url = encodeURIComponent('https://www.flirtlingua.com');
  window.open('https://www.facebook.com/sharer/sharer.php?u=' + url, '_blank');
}

function copyShareLink(btn) {
  const text = getShareText();
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => { btn.textContent = '🔗 Copy link'; }, 1500);
  });
}

function init() {
  getPotd();
  const inputSel = document.getElementById('inputLang');
  const outputSel = document.getElementById('outputLang');
  const phraseSel = document.getElementById('phraseSelect');

  // Populate input languages
  LANGUAGES.forEach(l => {
    const opt = new Option(`${l.flag}  ${l.name} (${l.native})`, l.bcp47);
    inputSel.appendChild(opt);
  });

  // Populate phrases with optgroups
  const romantic = document.createElement('optgroup');
  romantic.label = '💕 Romantic & Flirty';
  const essential = document.createElement('optgroup');
  essential.label = '🗺️ Essential Phrases';

  PHRASES.forEach(p => {
    const opt = new Option(p.label, p.key);
    if (p.category === 'essential') essential.appendChild(opt);
    else romantic.appendChild(opt);
  });
  phraseSel.appendChild(romantic);
  phraseSel.appendChild(essential);
}

function onInputChange() {
  const bcp47 = document.getElementById('inputLang').value;
  inputLang = LANGUAGES.find(l => l.bcp47 === bcp47) || null;
  const phraseSel = document.getElementById('phraseSelect');
  if (inputLang) {
    phraseSel.disabled = false;
    phraseSel.options[0].text = '— Choose a phrase —';
  } else {
    phraseSel.disabled = true;
    phraseSel.options[0].text = '— Select your language first —';
  }
  phraseSel.value = '';
  selectedPhrase = null;
  resetOutputLang();
  checkTranslateBtn();
}

function onPhraseChange() {
  const key = document.getElementById('phraseSelect').value;
  selectedPhrase = PHRASES.find(p => p.key === key) || null;
  populateOutputLangs();
  checkTranslateBtn();
}

function populateOutputLangs() {
  const sel = document.getElementById('outputLang');
  sel.innerHTML = '';
  if (!selectedPhrase) {
    sel.appendChild(new Option('— Pick a phrase first —', ''));
    sel.disabled = true;
    return;
  }
  sel.appendChild(new Option('— Choose output language —', ''));
  const translations = TRANSLATIONS[selectedPhrase.key] || {};
  LANGUAGES.forEach(l => {
    if (l.bcp47 === inputLang?.bcp47) return;
    if (!translations[l.bcp47]) return;
    const opt = new Option(`${l.flag}  ${l.name}`, l.bcp47);
    sel.appendChild(opt);
  });
  sel.disabled = false;
  outputLang = null;
}

function onOutputChange() {
  const bcp47 = document.getElementById('outputLang').value;
  outputLang = LANGUAGES.find(l => l.bcp47 === bcp47) || null;
  checkTranslateBtn();
}

function resetOutputLang() {
  const sel = document.getElementById('outputLang');
  sel.innerHTML = '';
  sel.appendChild(new Option('— Pick a phrase first —', ''));
  sel.disabled = true;
  outputLang = null;
}

function checkTranslateBtn() {
  const btn = document.getElementById('translateBtn');
  btn.disabled = !(inputLang && selectedPhrase && outputLang);
}

function showResult() {
  if (!inputLang || !selectedPhrase || !outputLang) return;
  const t = TRANSLATIONS[selectedPhrase.key]?.[outputLang.bcp47];
  if (!t) return;

  document.getElementById('rFlag').textContent = outputLang.flag;
  document.getElementById('rInto').textContent = `in ${outputLang.name} (${outputLang.native})`;
  document.getElementById('rLabel').textContent = selectedPhrase.label.replace(/^.+?  /, '');
  document.getElementById('rNative').textContent = t.native;
  document.getElementById('rPhonetic').textContent = '/' + t.phonetic + '/';

  // How to say it in input language
  const sayItEl = document.getElementById('rSayIt');
  const inputT = TRANSLATIONS[selectedPhrase.key]?.[inputLang.bcp47];
  if (inputT && inputLang.bcp47 !== outputLang.bcp47) {
    sayItEl.innerHTML = '<div class="say-label">How to say it (in ' + inputLang.name + ')</div>' + inputT.phonetic;
    sayItEl.style.display = 'block';
  } else {
    sayItEl.style.display = 'none';
  }
  // Reset copy button
  const copyBtn = document.getElementById('copyBtn');
  copyBtn.textContent = '📋 Copy';
  copyBtn.classList.remove('copied');

  // Phrase suggestions
  const phraseChips = document.getElementById('phraseChips');
  phraseChips.innerHTML = '';
  PHRASES.filter(p => p.key !== selectedPhrase.key).slice(0, 5).forEach(p => {
    const chip = document.createElement('button');
    chip.className = 'suggest-chip';
    chip.textContent = p.label;
    chip.onclick = () => {
      selectedPhrase = p;
      document.getElementById('phraseSelect').value = p.key;
      onPhraseChange();
      // keep same output lang if available
      const newT = TRANSLATIONS[p.key]?.[outputLang?.bcp47];
      if (newT && outputLang) {
        document.getElementById('outputLang').value = outputLang.bcp47;
        showResult();
      }
    };
    phraseChips.appendChild(chip);
  });

  // Language suggestions
  const langChips = document.getElementById('langChips');
  langChips.innerHTML = '';
  LANGUAGES
    .filter(l => l.bcp47 !== outputLang.bcp47 && l.bcp47 !== inputLang?.bcp47)
    .filter(l => TRANSLATIONS[selectedPhrase.key]?.[l.bcp47])
    .slice(0, 7).forEach(lang => {
      const chip = document.createElement('button');
      chip.className = 'suggest-chip';
      chip.textContent = `${lang.flag} ${lang.name}`;
      chip.onclick = () => {
        outputLang = lang;
        document.getElementById('outputLang').value = lang.bcp47;
        showResult();
      };
      langChips.appendChild(chip);
    });

  document.getElementById('resultSection').classList.remove('hidden');
  setTimeout(() => document.getElementById('resultSection').scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
}

function copyResult() {
  const t = TRANSLATIONS[selectedPhrase?.key]?.[outputLang?.bcp47];
  if (!t) return;
  const btn = document.getElementById('copyBtn');
  navigator.clipboard.writeText(t.native).then(() => {
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

function resetResult() {
  document.getElementById('resultSection').classList.add('hidden');
  document.getElementById('inputLang').value = '';
  document.getElementById('phraseSelect').value = '';
  document.getElementById('phraseSelect').disabled = true;
  document.getElementById('phraseSelect').options[0].text = '— Select your language first —';
  resetOutputLang();
  inputLang = null; selectedPhrase = null; outputLang = null;
  checkTranslateBtn();
  window.scrollTo({top:0, behavior:'smooth'});
}

init();
</script>
